<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSFS Airport Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0a0a12 0%, #12121f 50%, #0d0d18 100%);
      color: #e2e8f0;
      font-family: 'Inter', system-ui, sans-serif;
    }
    
    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid rgba(139, 92, 246, 0.15);
      background: rgba(10, 10, 18, 0.8);
      backdrop-filter: blur(12px);
    }
    
    .header-left { display: flex; align-items: center; gap: 16px; }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 18px;
      color: #c084fc;
    }
    
    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #8b5cf6 0%, #a855f7 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .logo-icon svg { width: 20px; height: 20px; stroke: white; fill: none; stroke-width: 2; }
    
    .header-right { display: flex; align-items: center; gap: 12px; }
    
    .sync-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #10b981;
    }
    
    .sync-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
    }
    
    .view-toggle {
      display: flex;
      background: rgba(139, 92, 246, 0.1);
      border-radius: 8px;
      padding: 4px;
      gap: 2px;
    }
    
    .view-btn {
      padding: 8px 12px;
      border: none;
      background: transparent;
      color: #94a3b8;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .view-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }
    
    .view-btn.active {
      background: rgba(139, 92, 246, 0.3);
      color: #c084fc;
    }
    
    .view-btn:hover:not(.active) {
      background: rgba(139, 92, 246, 0.15);
      color: #e2e8f0;
    }
    
    /* Toolbar */
    .toolbar {
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      border-bottom: 1px solid rgba(139, 92, 246, 0.1);
    }
    
    .toolbar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .btn-new-category {
      padding: 8px 16px;
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    
    .btn-new-category:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
    }
    
    .btn-new-category svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
    
    /* Categories */
    .categories {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      flex: 1;
    }
    
    .category-pill {
      padding: 6px 14px;
      background: rgba(139, 92, 246, 0.15);
      border: 1px solid rgba(139, 92, 246, 0.25);
      border-radius: 20px;
      color: #a78bfa;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }
    
    .category-pill:hover {
      background: rgba(139, 92, 246, 0.25);
      border-color: rgba(139, 92, 246, 0.4);
    }
    
    .category-pill.active {
      background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
      border-color: #8b5cf6;
      color: white;
      box-shadow: 0 2px 8px rgba(139, 92, 246, 0.4);
    }
    
    .category-count {
      font-size: 11px;
      padding: 2px 6px;
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
    }
    
    .category-actions {
      display: flex;
      gap: 4px;
      margin-left: 4px;
    }
    
    .category-action-btn {
      padding: 2px;
      background: transparent;
      border: none;
      color: inherit;
      opacity: 0.6;
      cursor: pointer;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .category-action-btn:hover { opacity: 1; background: rgba(255,255,255,0.1); }
    .category-action-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
    
    /* Filter Row */
    .filter-row { display: flex; align-items: center; gap: 12px; }
    
    .filter-label { color: #64748b; font-size: 13px; }
    
    .filter-input {
      flex: 0 0 280px;
      padding: 10px 14px;
      background: rgba(30, 30, 50, 0.6);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }
    
    .filter-input::placeholder { color: #64748b; }
    .filter-input:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
    }
    
    .action-buttons { display: flex; gap: 8px; margin-left: auto; }
    
    .btn {
      padding: 10px 16px;
      border: 1px solid rgba(139, 92, 246, 0.3);
      background: rgba(30, 30, 50, 0.6);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    
    .btn:hover {
      background: rgba(139, 92, 246, 0.2);
      border-color: rgba(139, 92, 246, 0.5);
    }
    
    .btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
    
    .btn-primary {
      background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
      border-color: #8b5cf6;
    }
    
    .btn-primary:hover {
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
      transform: translateY(-1px);
    }
    
    .btn-danger { border-color: rgba(239, 68, 68, 0.3); color: #f87171; }
    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.5);
    }
    
    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      position: relative;
    }
    
    .map-bg {
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 30%, rgba(34, 197, 94, 0.05) 0%, transparent 40%),
        linear-gradient(180deg, transparent 0%, rgba(10, 10, 18, 0.9) 100%);
      pointer-events: none;
    }
    
    .map-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(139, 92, 246, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139, 92, 246, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }
    
    /* Airport Table */
    .airport-table-container {
      flex: 1;
      padding: 24px;
      overflow: auto;
      position: relative;
      z-index: 1;
    }
    
    .airport-table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(20, 20, 35, 0.7);
      border-radius: 12px;
      overflow: hidden;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(139, 92, 246, 0.15);
    }
    
    .airport-table th {
      padding: 14px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #a78bfa;
      background: rgba(139, 92, 246, 0.1);
      border-bottom: 1px solid rgba(139, 92, 246, 0.2);
    }
    
    .airport-table td {
      padding: 14px 16px;
      font-size: 14px;
      border-bottom: 1px solid rgba(139, 92, 246, 0.08);
      vertical-align: middle;
    }
    
    .airport-table tr:hover td { background: rgba(139, 92, 246, 0.08); }
    .airport-table tr:last-child td { border-bottom: none; }
    
    .icao-code {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      color: #c084fc;
      font-size: 15px;
    }
    
    .airport-name { color: #e2e8f0; font-weight: 500; }
    .airport-country { color: #94a3b8; }
    
    .airport-notes {
      color: #64748b;
      font-size: 13px;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .difficulty-stars { display: flex; gap: 2px; }
    
    .star {
      color: #334155;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.15s;
    }
    
    .star.active { color: #fbbf24; }
    .star.readonly { cursor: default; }
    
    .row-actions { display: flex; gap: 6px; }
    
    .row-action-btn {
      padding: 6px;
      background: transparent;
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 6px;
      color: #94a3b8;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .row-action-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
    
    .row-action-btn:hover {
      background: rgba(139, 92, 246, 0.15);
      border-color: rgba(139, 92, 246, 0.4);
      color: #c084fc;
    }
    
    .row-action-btn.delete:hover {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.4);
      color: #f87171;
    }
    
    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 40px;
      text-align: center;
      color: #64748b;
    }
    
    .empty-state svg { width: 64px; height: 64px; stroke: #64748b; fill: none; stroke-width: 1.5; margin-bottom: 16px; opacity: 0.4; }
    .empty-state h3 { font-size: 18px; color: #94a3b8; margin-bottom: 8px; }
    .empty-state p { font-size: 14px; margin-bottom: 24px; }
    
    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal-overlay.open { display: flex; }
    
    .modal-content {
      background: linear-gradient(145deg, #1a1a2e 0%, #16162a 100%);
      border: 1px solid rgba(139, 92, 246, 0.25);
      border-radius: 16px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid rgba(139, 92, 246, 0.15);
    }
    
    .modal-header h3 { font-size: 18px; font-weight: 600; color: #e2e8f0; }
    
    .modal-close {
      padding: 6px;
      background: transparent;
      border: none;
      color: #64748b;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .modal-close svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
    .modal-close:hover { background: rgba(239, 68, 68, 0.15); color: #f87171; }
    
    .modal-body { padding: 24px; }
    
    .form-group { margin-bottom: 20px; }
    .form-group:last-child { margin-bottom: 0; }
    
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #a78bfa;
      margin-bottom: 8px;
    }
    
    .form-input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(30, 30, 50, 0.8);
      border: 1px solid rgba(139, 92, 246, 0.25);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }
    
    .form-input:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
    }
    
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }
    
    .color-picker-row { display: flex; gap: 8px; flex-wrap: wrap; }
    
    .color-swatch {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .color-swatch.selected {
      border-color: white;
      transform: scale(1.1);
    }
    
    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    
    .modal-actions .btn { flex: 1; justify-content: center; }
    
    .file-input-hidden { display: none; }
    
    /* Difficulty in modal */
    .difficulty-input { display: flex; gap: 4px; }
    .difficulty-input .star { font-size: 24px; }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
          </div>
          MSFS Airport Manager
        </div>
      </div>
      <div class="header-right">
        <div class="sync-status">
          <div class="sync-dot"></div>
          <span>Synced</span>
        </div>
        <div class="view-toggle">
          <button class="view-btn active" title="Liste">
            <svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
          </button>
          <button class="view-btn" title="Globus">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          </button>
          <button class="view-btn" title="Karte">
            <svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
          </button>
        </div>
      </div>
    </header>
    
    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-row">
        <button class="btn-new-category" onclick="openNewCategoryModal()">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Neue Kategorie
        </button>
        <div class="categories" id="categoriesContainer"></div>
      </div>
      
      <div class="filter-row">
        <span class="filter-label">Filter:</span>
        <input type="text" class="filter-input" id="filterInput" placeholder="ICAO, city, country..." oninput="renderAirports()">
        
        <div class="action-buttons">
          <button class="btn btn-primary" onclick="openAddAirportModal()">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add airport
          </button>
          <button class="btn btn-danger" onclick="clearAllAirports()">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            Clear all
          </button>
          <button class="btn" onclick="exportXLSX()">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export XLSX
          </button>
          <label class="btn">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Import XLSX
            <input type="file" class="file-input-hidden" accept=".xlsx,.xls" onchange="importXLSX(event)">
          </label>
        </div>
      </div>
    </div>
    
    <!-- Main Content -->
    <div class="main-content">
      <div class="map-bg"></div>
      <div class="map-grid"></div>
      <div class="airport-table-container" id="airportTableContainer"></div>
    </div>
  </div>
  
  <!-- New Category Modal -->
  <div class="modal-overlay" id="newCategoryModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Neue Kategorie erstellen</h3>
        <button class="modal-close" onclick="closeModal('newCategoryModal')">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Kategorie Name</label>
          <input type="text" class="form-input" id="newCategoryName" placeholder="z.B. Alpine Airports">
        </div>
        <div class="form-group">
          <label class="form-label">Farbe</label>
          <div class="color-picker-row" id="colorPicker"></div>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal('newCategoryModal')">Abbrechen</button>
          <button class="btn btn-primary" onclick="addCategory()">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            Erstellen
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Edit Category Modal -->
  <div class="modal-overlay" id="editCategoryModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Kategorie bearbeiten</h3>
        <button class="modal-close" onclick="closeModal('editCategoryModal')">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Kategorie Name</label>
          <input type="text" class="form-input" id="editCategoryName">
        </div>
        <div class="form-group">
          <label class="form-label">Farbe</label>
          <div class="color-picker-row" id="editColorPicker"></div>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal('editCategoryModal')">Abbrechen</button>
          <button class="btn btn-primary" onclick="saveEditCategory()">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            Speichern
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Add Airport Modal -->
  <div class="modal-overlay" id="addAirportModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Airport hinzufügen</h3>
        <button class="modal-close" onclick="closeModal('addAirportModal')">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">ICAO Code *</label>
            <input type="text" class="form-input" id="airportIcao" placeholder="LOWI" maxlength="4" oninput="this.value = this.value.toUpperCase()">
          </div>
          <div class="form-group">
            <label class="form-label">Name</label>
            <input type="text" class="form-input" id="airportName" placeholder="Innsbruck">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Country</label>
          <input type="text" class="form-input" id="airportCountry" placeholder="Austria">
        </div>
        <div class="form-group">
          <label class="form-label">Notes</label>
          <input type="text" class="form-input" id="airportNotes" placeholder="Challenging approach through the Alps">
        </div>
        <div class="form-group">
          <label class="form-label">Difficulty</label>
          <div class="difficulty-input" id="addDifficulty"></div>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal('addAirportModal')">Abbrechen</button>
          <button class="btn btn-primary" onclick="addAirport()">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Hinzufügen
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Edit Airport Modal -->
  <div class="modal-overlay" id="editAirportModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Airport bearbeiten</h3>
        <button class="modal-close" onclick="closeModal('editAirportModal')">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">ICAO Code *</label>
            <input type="text" class="form-input" id="editAirportIcao" maxlength="4" oninput="this.value = this.value.toUpperCase()">
          </div>
          <div class="form-group">
            <label class="form-label">Name</label>
            <input type="text" class="form-input" id="editAirportName">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Country</label>
          <input type="text" class="form-input" id="editAirportCountry">
        </div>
        <div class="form-group">
          <label class="form-label">Notes</label>
          <input type="text" class="form-input" id="editAirportNotes">
        </div>
        <div class="form-group">
          <label class="form-label">Difficulty</label>
          <div class="difficulty-input" id="editDifficulty"></div>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal('editAirportModal')">Abbrechen</button>
          <button class="btn btn-primary" onclick="saveEditAirport()">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            Speichern
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Data
    const STORAGE_KEY = 'msfs-airport-data';
    const COLORS = ['#8b5cf6', '#a855f7', '#ec4899', '#f43f5e', '#f97316', '#eab308', '#22c55e', '#14b8a6', '#06b6d4', '#3b82f6'];
    
    let data = {
      categories: [
        { id: 'difficult', name: 'Difficult Airports', color: '#6366f1' },
        { id: 'interesting', name: 'Interesting Airports', color: '#8b5cf6' },
        { id: 'mountain', name: 'Mountain Climbing', color: '#a855f7' },
        { id: 'routings', name: 'Routings', color: '#7c3aed' },
        { id: 'formula1', name: 'Formula 1', color: '#6d28d9' },
        { id: 'british', name: 'British Isles', color: '#c084fc' },
        { id: 'nordics', name: 'Nordics', color: '#5b21b6' },
        { id: 'central-europe', name: 'Central Europe', color: '#4c1d95' },
        { id: 'france-belux', name: 'France / Belux', color: '#7e22ce' },
        { id: 'iberia', name: 'Iberia', color: '#9333ea' },
        { id: 'eastern-med', name: 'Eastern Mediterranean', color: '#a21caf' }
      ],
      airports: {
        'difficult': [
          { id: '1', icao: 'LOWI', name: 'Innsbruck', country: 'Austria', notes: 'Challenging approach through the Alps', difficulty: 5 },
          { id: '2', icao: 'VNLK', name: 'Lukla', country: 'Nepal', notes: 'World famous dangerous airport', difficulty: 5 },
          { id: '3', icao: 'LPMA', name: 'Madeira', country: 'Portugal', notes: 'Short runway, crosswinds', difficulty: 4 },
        ],
        'interesting': [
          { id: '4', icao: 'VQPR', name: 'Paro', country: 'Bhutan', notes: 'Mountain valley approach', difficulty: 5 },
          { id: '5', icao: 'NZQN', name: 'Queenstown', country: 'New Zealand', notes: 'Scenic mountain airport', difficulty: 3 },
        ],
        'mountain': [
          { id: '6', icao: 'LFLJ', name: 'Courchevel', country: 'France', notes: 'Famous altiport, steep slope', difficulty: 5 },
          { id: '7', icao: 'LSGS', name: 'Sion', country: 'Switzerland', notes: 'Alpine valley', difficulty: 3 },
        ],
        'formula1': [],
        'british': [],
        'nordics': [],
        'central-europe': [],
        'france-belux': [],
        'iberia': [],
        'eastern-med': [],
        'routings': []
      },
      activeCategory: 'difficult'
    };
    
    let selectedColor = '#8b5cf6';
    let editingCategoryId = null;
    let editingAirportId = null;
    let addDifficultyLevel = 3;
    let editDifficultyLevel = 3;
    
    // Load from localStorage
    function loadData() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          data = JSON.parse(saved);
        }
      } catch (e) {
        console.log('Could not load data');
      }
    }
    
    // Save to localStorage
    function saveData() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (e) {
        console.log('Could not save data');
      }
    }
    
    // Render categories
    function renderCategories() {
      const container = document.getElementById('categoriesContainer');
      container.innerHTML = data.categories.map(cat => {
        const count = (data.airports[cat.id] || []).length;
        const isActive = cat.id === data.activeCategory;
        return `
          <div class="category-pill ${isActive ? 'active' : ''}" onclick="selectCategory('${cat.id}')">
            ${cat.name}
            <span class="category-count">${count}</span>
            ${isActive ? `
              <div class="category-actions">
                <button class="category-action-btn" onclick="event.stopPropagation(); openEditCategoryModal('${cat.id}')" title="Bearbeiten">
                  <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button class="category-action-btn" onclick="event.stopPropagation(); deleteCategory('${cat.id}')" title="Löschen">
                  <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                </button>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
    }
    
    // Render airports table
    function renderAirports() {
      const container = document.getElementById('airportTableContainer');
      const filterText = document.getElementById('filterInput').value.toLowerCase();
      const airports = data.airports[data.activeCategory] || [];
      
      const filtered = airports.filter(apt => {
        if (!filterText) return true;
        return apt.icao.toLowerCase().includes(filterText) ||
               apt.name.toLowerCase().includes(filterText) ||
               apt.country.toLowerCase().includes(filterText);
      });
      
      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
            <h3>Keine Airports</h3>
            <p>${data.activeCategory ? 'Füge Airports zu dieser Kategorie hinzu' : 'Wähle eine Kategorie aus'}</p>
            ${data.activeCategory ? `
              <button class="btn btn-primary" onclick="openAddAirportModal()">
                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Airport hinzufügen
              </button>
            ` : ''}
          </div>
        `;
        return;
      }
      
      container.innerHTML = `
        <table class="airport-table">
          <thead>
            <tr>
              <th>ICAO</th>
              <th>Name</th>
              <th>Country</th>
              <th>Notes</th>
              <th>Difficulty</th>
              <th style="width: 80px">Actions</th>
            </tr>
          </thead>
          <tbody>
            ${filtered.map(apt => `
              <tr>
                <td><span class="icao-code">${apt.icao}</span></td>
                <td><span class="airport-name">${apt.name}</span></td>
                <td><span class="airport-country">${apt.country}</span></td>
                <td><span class="airport-notes" title="${apt.notes || ''}">${apt.notes || ''}</span></td>
                <td>
                  <div class="difficulty-stars">
                    ${[1,2,3,4,5].map(i => `<span class="star readonly ${i <= apt.difficulty ? 'active' : ''}">★</span>`).join('')}
                  </div>
                </td>
                <td>
                  <div class="row-actions">
                    <button class="row-action-btn" onclick="openEditAirportModal('${apt.id}')" title="Bearbeiten">
                      <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </button>
                    <button class="row-action-btn delete" onclick="deleteAirport('${apt.id}')" title="Löschen">
                      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }
    
    // Render color picker
    function renderColorPicker(containerId, selected) {
      const container = document.getElementById(containerId);
      container.innerHTML = COLORS.map(color => 
        `<div class="color-swatch ${color === selected ? 'selected' : ''}" 
              style="background: ${color}" 
              onclick="selectColor('${containerId}', '${color}')"></div>`
      ).join('');
    }
    
    // Render difficulty stars
    function renderDifficultyInput(containerId, level, callback) {
      const container = document.getElementById(containerId);
      container.innerHTML = [1,2,3,4,5].map(i => 
        `<span class="star ${i <= level ? 'active' : ''}" onclick="${callback}(${i})">★</span>`
      ).join('');
    }
    
    function setAddDifficulty(level) {
      addDifficultyLevel = level;
      renderDifficultyInput('addDifficulty', level, 'setAddDifficulty');
    }
    
    function setEditDifficulty(level) {
      editDifficultyLevel = level;
      renderDifficultyInput('editDifficulty', level, 'setEditDifficulty');
    }
    
    // Select color
    function selectColor(containerId, color) {
      selectedColor = color;
      renderColorPicker(containerId, color);
    }
    
    // Select category
    function selectCategory(id) {
      data.activeCategory = id;
      saveData();
      renderCategories();
      renderAirports();
    }
    
    // Modal functions
    function openModal(id) {
      document.getElementById(id).classList.add('open');
    }
    
    function closeModal(id) {
      document.getElementById(id).classList.remove('open');
    }
    
    // New Category
    function openNewCategoryModal() {
      document.getElementById('newCategoryName').value = '';
      selectedColor = '#8b5cf6';
      renderColorPicker('colorPicker', selectedColor);
      openModal('newCategoryModal');
      document.getElementById('newCategoryName').focus();
    }
    
    function addCategory() {
      const name = document.getElementById('newCategoryName').value.trim();
      if (!name) return;
      
      const id = 'cat-' + Date.now();
      data.categories.push({ id, name, color: selectedColor });
      data.airports[id] = [];
      saveData();
      renderCategories();
      closeModal('newCategoryModal');
    }
    
    // Edit Category
    function openEditCategoryModal(id) {
      const cat = data.categories.find(c => c.id === id);
      if (!cat) return;
      
      editingCategoryId = id;
      document.getElementById('editCategoryName').value = cat.name;
      selectedColor = cat.color;
      renderColorPicker('editColorPicker', selectedColor);
      openModal('editCategoryModal');
    }
    
    function saveEditCategory() {
      const name = document.getElementById('editCategoryName').value.trim();
      if (!name || !editingCategoryId) return;
      
      const cat = data.categories.find(c => c.id === editingCategoryId);
      if (cat) {
        cat.name = name;
        cat.color = selectedColor;
        saveData();
        renderCategories();
      }
      closeModal('editCategoryModal');
    }
    
    // Delete Category
    function deleteCategory(id) {
      if (!confirm('Diese Kategorie und alle Airports darin löschen?')) return;
      
      data.categories = data.categories.filter(c => c.id !== id);
      delete data.airports[id];
      
      if (data.activeCategory === id) {
        data.activeCategory = data.categories[0]?.id || null;
      }
      
      saveData();
      renderCategories();
      renderAirports();
    }
    
    // Add Airport
    function openAddAirportModal() {
      if (!data.activeCategory) return;
      
      document.getElementById('airportIcao').value = '';
      document.getElementById('airportName').value = '';
      document.getElementById('airportCountry').value = '';
      document.getElementById('airportNotes').value = '';
      addDifficultyLevel = 3;
      renderDifficultyInput('addDifficulty', 3, 'setAddDifficulty');
      openModal('addAirportModal');
      document.getElementById('airportIcao').focus();
    }
    
    function addAirport() {
      const icao = document.getElementById('airportIcao').value.trim().toUpperCase();
      if (!icao || !data.activeCategory) return;
      
      const airport = {
        id: 'apt-' + Date.now(),
        icao,
        name: document.getElementById('airportName').value.trim(),
        country: document.getElementById('airportCountry').value.trim(),
        notes: document.getElementById('airportNotes').value.trim(),
        difficulty: addDifficultyLevel
      };
      
      if (!data.airports[data.activeCategory]) {
        data.airports[data.activeCategory] = [];
      }
      data.airports[data.activeCategory].push(airport);
      saveData();
      renderCategories();
      renderAirports();
      closeModal('addAirportModal');
    }
    
    // Edit Airport
    function openEditAirportModal(id) {
      const airports = data.airports[data.activeCategory] || [];
      const airport = airports.find(a => a.id === id);
      if (!airport) return;
      
      editingAirportId = id;
      document.getElementById('editAirportIcao').value = airport.icao;
      document.getElementById('editAirportName').value = airport.name;
      document.getElementById('editAirportCountry').value = airport.country;
      document.getElementById('editAirportNotes').value = airport.notes || '';
      editDifficultyLevel = airport.difficulty || 3;
      renderDifficultyInput('editDifficulty', editDifficultyLevel, 'setEditDifficulty');
      openModal('editAirportModal');
    }
    
    function saveEditAirport() {
      const icao = document.getElementById('editAirportIcao').value.trim().toUpperCase();
      if (!icao || !editingAirportId) return;
      
      const airports = data.airports[data.activeCategory] || [];
      const airport = airports.find(a => a.id === editingAirportId);
      if (airport) {
        airport.icao = icao;
        airport.name = document.getElementById('editAirportName').value.trim();
        airport.country = document.getElementById('editAirportCountry').value.trim();
        airport.notes = document.getElementById('editAirportNotes').value.trim();
        airport.difficulty = editDifficultyLevel;
        saveData();
        renderAirports();
      }
      closeModal('editAirportModal');
    }
    
    // Delete Airport
    function deleteAirport(id) {
      data.airports[data.activeCategory] = (data.airports[data.activeCategory] || []).filter(a => a.id !== id);
      saveData();
      renderCategories();
      renderAirports();
    }
    
    // Clear all airports
    function clearAllAirports() {
      if (!data.activeCategory) return;
      if (!confirm('Alle Airports in dieser Kategorie löschen?')) return;
      
      data.airports[data.activeCategory] = [];
      saveData();
      renderCategories();
      renderAirports();
    }
    
    // Export XLSX
    function exportXLSX() {
      if (!data.activeCategory) return;
      
      const airports = data.airports[data.activeCategory] || [];
      const category = data.categories.find(c => c.id === data.activeCategory);
      
      const exportData = airports.map(apt => ({
        ICAO: apt.icao,
        Name: apt.name,
        Country: apt.country,
        Notes: apt.notes || '',
        Difficulty: apt.difficulty || 3
      }));
      
      const ws = XLSX.utils.json_to_sheet(exportData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, category?.name || 'Airports');
      XLSX.writeFile(wb, `${category?.name || 'airports'}.xlsx`);
    }
    
    // Import XLSX
    function importXLSX(event) {
      const file = event.target.files?.[0];
      if (!file || !data.activeCategory) return;
      
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const fileData = new Uint8Array(e.target.result);
          const wb = XLSX.read(fileData, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const json = XLSX.utils.sheet_to_json(ws);
          
          const imported = json.map((row, idx) => ({
            id: 'imp-' + Date.now() + '-' + idx,
            icao: (row.ICAO || row.icao || '').toUpperCase(),
            name: row.Name || row.name || '',
            country: row.Country || row.country || '',
            notes: row.Notes || row.notes || '',
            difficulty: parseInt(row.Difficulty || row.difficulty) || 3
          })).filter(apt => apt.icao);
          
          if (!data.airports[data.activeCategory]) {
            data.airports[data.activeCategory] = [];
          }
          data.airports[data.activeCategory].push(...imported);
          saveData();
          renderCategories();
          renderAirports();
          
          alert(`${imported.length} Airports importiert!`);
        } catch (err) {
          alert('Fehler beim Import: ' + err.message);
        }
      };
      reader.readAsArrayBuffer(file);
      event.target.value = '';
    }
    
    // Close modals on escape
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
      }
    });
    
    // Close modals on overlay click
    document.querySelectorAll('.modal-overlay').forEach(modal => {
      modal.addEventListener('click', function(e) {
        if (e.target === this) {
          this.classList.remove('open');
        }
      });
    });
    
    // Initialize
    loadData();
    renderCategories();
    renderAirports();
  </script>
</body>
</html>
