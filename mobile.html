<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d1117">
  <title>MSFS Randomizer</title>

  <style>
:root {
  --bg: #0d1117;
  --surf: #161b22;
  --surf2: #21262d;
  --surf3: #30363d;
  --bdr: #30363d;
  --bdr2: #484f58;
  --txt: #e6edf3;
  --txt2: #8b949e;
  --txt3: #6e7681;
  --acc: #7d5ee8;
  --acc2: #a78bfa;
  --green: #3fb950;
  --orange: #f0883e;
  --red: #f85149;
  --blue: #58a6ff;
  --r: 12px;
  --ff: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { 
  height: 100%; 
  overflow: hidden;
  background: var(--bg); 
  color: var(--txt); 
  font-family: var(--ff);
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100%;
  padding-top: var(--safe-top);
}

.header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--bdr);
  background: var(--surf);
}
.header-title { font-size: 17px; font-weight: 600; }
.header-status { font-size: 12px; color: var(--green); }

.main {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.tab-content {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: none;
}
.tab-content.active { display: flex; flex-direction: column; }

.bottom-nav {
  flex-shrink: 0;
  display: flex;
  justify-content: space-around;
  padding: 8px 0 calc(8px + var(--safe-bottom));
  background: var(--surf);
  border-top: 1px solid var(--bdr);
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 16px;
  border: none;
  background: none;
  color: var(--txt3);
  font-size: 10px;
  font-family: var(--ff);
}
.nav-item.active { color: var(--acc2); }
.nav-item svg { width: 24px; height: 24px; }

/* LOGBOOK */
#globe-container {
  width: 100%;
  height: 200px;
  flex-shrink: 0;
  background: var(--bg);
}
#globe-canvas { width: 100%; height: 100%; display: block; }

.logbook-stats {
  display: flex;
  justify-content: space-around;
  padding: 12px 16px;
  background: var(--surf);
  border-bottom: 1px solid var(--bdr);
  flex-shrink: 0;
}
.stat-item { text-align: center; }
.stat-value { font-size: 20px; font-weight: 700; color: var(--acc2); }
.stat-label { font-size: 10px; color: var(--txt3); text-transform: uppercase; }

.logbook-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  padding-bottom: calc(80px + var(--safe-bottom));
}

.flight-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  background: var(--surf);
  border: 1px solid var(--bdr);
  border-radius: var(--r);
  margin-bottom: 8px;
}
.flight-item.planned { border-left: 3px solid var(--blue); }
.flight-item.flown { border-left: 3px solid var(--green); }

.flight-logo {
  width: 36px;
  height: 36px;
  border-radius: 6px;
  background: var(--surf2);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}
.flight-logo img { width: 100%; height: 100%; object-fit: contain; }
.flight-logo-text { font-size: 10px; font-weight: 700; color: var(--txt3); }

.flight-route { flex: 1; min-width: 0; }
.flight-icaos {
  font-family: 'SF Mono', monospace;
  font-size: 15px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}
.flight-arrow { color: var(--txt3); font-size: 12px; }
.flight-cities {
  font-size: 11px;
  color: var(--txt3);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.flight-eqp {
  font-family: 'SF Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--orange);
  background: rgba(240,136,62,0.15);
  padding: 4px 8px;
  border-radius: 4px;
  flex-shrink: 0;
}

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--txt3);
}
.empty-state-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }

/* ROLL */
.roll-tab-content {
  padding: 16px;
  padding-bottom: calc(80px + var(--safe-bottom));
}
.roll-button {
  width: 100%;
  padding: 18px;
  margin-bottom: 20px;
  border: none;
  border-radius: var(--r);
  background: linear-gradient(135deg, var(--acc) 0%, #6344c7 100%);
  color: white;
  font-size: 18px;
  font-weight: 600;
  font-family: var(--ff);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: 0 4px 16px rgba(125,94,232,0.3);
}
.roll-button:active { transform: scale(0.98); }
.roll-button svg { width: 24px; height: 24px; }

.results-list { display: flex; flex-direction: column; gap: 12px; }
.result-card {
  background: var(--surf);
  border: 1px solid var(--bdr);
  border-radius: var(--r);
  padding: 14px 16px;
}
.result-card:active { background: var(--surf2); }
.result-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.result-dot { width: 8px; height: 8px; border-radius: 50%; }
.result-cat-name { font-size: 11px; font-weight: 600; color: var(--txt2); text-transform: uppercase; }
.result-icao { font-size: 22px; font-weight: 700; font-family: 'SF Mono', monospace; color: var(--acc2); }
.result-iata { color: var(--blue); font-size: 16px; margin-left: 6px; }
.result-city { font-size: 15px; margin-top: 2px; }
.result-country { font-size: 13px; color: var(--txt2); }
.result-badge {
  display: inline-block;
  margin-top: 8px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  background: rgba(240,136,62,0.15);
  color: var(--orange);
  border: 1px solid rgba(240,136,62,0.3);
}

/* DATA */
.data-tab-content { padding: 16px; padding-bottom: calc(80px + var(--safe-bottom)); }
.cat-section { margin-bottom: 24px; }
.cat-section-title { font-size: 13px; font-weight: 600; color: var(--txt2); text-transform: uppercase; margin-bottom: 12px; }
.cat-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.cat-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 14px;
  background: var(--surf);
  border: 1px solid var(--bdr);
  border-radius: 20px;
  font-size: 13px;
}
.cat-chip:active { background: var(--surf2); }
.cat-chip-dot { width: 8px; height: 8px; border-radius: 50%; }
.cat-chip-count { font-size: 11px; color: var(--txt3); }

.cat-detail { display: none; padding: 16px; padding-bottom: calc(80px + var(--safe-bottom)); }
.cat-detail.active { display: block; }
.cat-detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.cat-back-btn {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border: none; background: var(--surf); border-radius: 50%; color: var(--txt);
}
.cat-detail-title { font-size: 18px; font-weight: 600; }
.cat-items-list { display: flex; flex-direction: column; gap: 8px; }
.cat-item {
  display: flex;
  align-items: center;
  padding: 12px;
  background: var(--surf);
  border: 1px solid var(--bdr);
  border-radius: var(--r);
}
.cat-item-icao { font-family: 'SF Mono', monospace; font-size: 14px; font-weight: 600; color: var(--acc2); width: 55px; }
.cat-item-name { flex: 1; font-size: 14px; }
.cat-item-country { font-size: 12px; color: var(--txt3); }

/* LOADING */
.loading-overlay {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999;
  transition: opacity 0.3s;
}
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--surf2);
  border-top-color: var(--acc);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { margin-top: 16px; font-size: 14px; color: var(--txt2); }
  </style>
</head>

  <script>
const COLORS = ['#7d5ee8','#3fb950','#f0883e','#58a6ff','#d29922','#ec6547','#56d364','#79c0ff','#a78bfa','#ff7b72','#d2a8ff','#ffa657'];
const COUNTRY_NAMES = {US:'United States',GB:'United Kingdom',FR:'France',DE:'Germany',IT:'Italy',ES:'Spain',AT:'Austria',CH:'Switzerland',NL:'Netherlands',BE:'Belgium',CA:'Canada',JP:'Japan',AU:'Australia',NZ:'New Zealand',BR:'Brazil',MX:'Mexico',CN:'China',IN:'India',SG:'Singapore',AE:'UAE',QA:'Qatar',NO:'Norway',SE:'Sweden',DK:'Denmark',FI:'Finland',IS:'Iceland',GR:'Greece',TR:'Turkey',PT:'Portugal',PL:'Poland',CZ:'Czechia',HU:'Hungary',IE:'Ireland',LU:'Luxembourg',HR:'Croatia',RU:'Russia',UA:'Ukraine',IL:'Israel',EG:'Egypt',ZA:'South Africa',KR:'South Korea',TW:'Taiwan',HK:'Hong Kong',TH:'Thailand',MY:'Malaysia',ID:'Indonesia',PH:'Philippines',VN:'Vietnam'};
function countryName(iso) { return COUNTRY_NAMES[iso] || iso; }

let CATEGORIES = [
  {id:'difficult',name:'Difficult Airports',group:'themes',colorIdx:0,type:'list',items:[]},
  {id:'interesting',name:'Interesting Airports',group:'themes',colorIdx:1,type:'list-simple',items:[]},
  {id:'mountain',name:'Mountain Climbing',group:'themes',colorIdx:2,type:'list-simple',items:[]},
  {id:'formula1',name:'Formula 1',group:'themes',colorIdx:4,type:'list-simple',items:[]},
  {id:'rand_icao',name:'Random ICAO',group:'randoms',colorIdx:5,type:'rand-icao',items:[]},
  {id:'rand_iata',name:'Random IATA',group:'randoms',colorIdx:6,type:'rand-iata',items:[]},
  {id:'british',name:'British Isles',group:'networks',colorIdx:0,type:'list-simple',items:[]},
  {id:'nordics',name:'Nordics',group:'networks',colorIdx:1,type:'list-simple',items:[]},
  {id:'central_eu',name:'Central Europe',group:'networks',colorIdx:2,type:'list-simple',items:[]},
];

let schedByCode = {};
let logbookFlights = [];
let lastResults = [];
let airlineLogos = {};
let globe = { canvas: null, ctx: null, rotation: 0, isDragging: false, lastX: 0, width: 0, height: 0 };

// SUPABASE
const SUPA_URL = 'https://pvsvpkquoqffprmrlvbv.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2c3Zwa3F1b3FmZnBybXJsdmJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NDg1NjUsImV4cCI6MjA5MTAyNDU2NX0.XTwueIlgbtkK56GJq-gPfjueOKTw1b6YtLLjQwx19pc';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

function setCloudStatus(msg, cls) {
  const el = document.getElementById('cloud-status');
  if (el) { el.textContent = msg; el.style.color = cls === 'ok' ? '#3fb950' : cls === 'err' ? '#f85149' : '#d29922'; }
}

async function loadAllFromCloud() {
  setCloudStatus('Loading…', 'ing');
  try {
    const { data, error } = await sb.from('categories').select('name, items');
    if (error) throw error;
    if (data && data.length > 0) {
      const byId = {};
      data.forEach(row => { byId[row.name] = row.items; });
      if (byId['__logbook__']) logbookFlights = byId['__logbook__'];
      if (byId['__airline_logos__']) byId['__airline_logos__'].forEach(l => { airlineLogos[l.code] = l.url; });
      CATEGORIES.forEach(cat => { if (byId[cat.id] && Array.isArray(byId[cat.id])) cat.items = byId[cat.id]; });
      const existingIds = new Set(CATEGORIES.map(c => c.id));
      data.forEach(row => {
        if (!existingIds.has(row.name) && !row.name.startsWith('__') && Array.isArray(row.items) && row.items.length > 0) {
          if (row.items[0] && row.items[0].theme !== undefined) {
            CATEGORIES.push({ id: row.name, name: row.name.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase()), group: 'custom', colorIdx: CATEGORIES.length % 12, type: 'list-themed', items: row.items });
          }
        }
      });
      setCloudStatus('✓ Synced', 'ok');
    }
  } catch(e) { console.error(e); setCloudStatus('⚠ Offline', 'err'); }
}

// NAV
function switchTab(tabId) {
  document.querySelectorAll('.nav-item').forEach((btn, i) => {

// GLOBE
function initGlobe() {
  globe.canvas = document.getElementById('globe-canvas');
  globe.ctx = globe.canvas.getContext('2d');
  function resize() {
    const c = document.getElementById('globe-container');
    const dpr = window.devicePixelRatio || 1;
    globe.canvas.width = c.offsetWidth * dpr;
    globe.canvas.height = c.offsetHeight * dpr;
    globe.ctx.scale(dpr, dpr);
    globe.width = c.offsetWidth;
    globe.height = c.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  globe.canvas.addEventListener('touchstart', e => { globe.isDragging = true; globe.lastX = e.touches[0].clientX; });
  globe.canvas.addEventListener('touchmove', e => {
    if (!globe.isDragging) return;
    globe.rotation += (e.touches[0].clientX - globe.lastX) * 0.5;
    globe.lastX = e.touches[0].clientX;
    drawGlobe();
  });
  globe.canvas.addEventListener('touchend', () => { globe.isDragging = false; });
  drawGlobe();
}

function latLonToGlobe(lat, lon, cx, cy, r) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lon + globe.rotation) * Math.PI / 180;
  const x = r * Math.sin(phi) * Math.cos(theta);
  const y = r * Math.cos(phi);
  const z = r * Math.sin(phi) * Math.sin(theta);
  if (z < 0) return null;
  return { x: cx + x, y: cy - y };
}

function drawGlobe() {
  const ctx = globe.ctx, w = globe.width, h = globe.height;
  const cx = w / 2, cy = h / 2, r = Math.min(w, h) * 0.4;
  ctx.fillStyle = '#0d1117'; ctx.fillRect(0, 0, w, h);
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = '#161b22'; ctx.fill();
  ctx.strokeStyle = '#30363d'; ctx.lineWidth = 1; ctx.stroke();
  
  // Grid
  ctx.strokeStyle = 'rgba(48,54,61,0.5)'; ctx.lineWidth = 0.5;
  for (let lon = -180; lon < 180; lon += 30) {
    ctx.beginPath(); let s = false;
    for (let lat = -90; lat <= 90; lat += 5) {
      const p = latLonToGlobe(lat, lon, cx, cy, r);
      if (p) { if (!s) { ctx.moveTo(p.x, p.y); s = true; } else ctx.lineTo(p.x, p.y); }
    }
    ctx.stroke();
  }
  for (let lat = -60; lat <= 60; lat += 30) {
    ctx.beginPath(); let s = false;
    for (let lon = -180; lon <= 180; lon += 5) {
      const p = latLonToGlobe(lat, lon, cx, cy, r);
      if (p) { if (!s) { ctx.moveTo(p.x, p.y); s = true; } else ctx.lineTo(p.x, p.y); }
    }
    ctx.stroke();
  }
  
  // Flights
  logbookFlights.forEach(f => {
    if (!f.dep_lat || !f.arr_lat) return;
    const p1 = latLonToGlobe(f.dep_lat, f.dep_lon, cx, cy, r);
    const p2 = latLonToGlobe(f.arr_lat, f.arr_lon, cx, cy, r);
    if (!p1 || !p2) return;
    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
    ctx.strokeStyle = f.planned ? 'rgba(88,166,255,0.7)' : 'rgba(63,185,80,0.7)';
    ctx.lineWidth = 2; ctx.stroke();
    [p1, p2].forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fillStyle = f.planned ? '#58a6ff' : '#3fb950'; ctx.fill(); });
  });
}

// LOGBOOK
function renderLogbook() {
  const planned = logbookFlights.filter(f => f.planned).length;
  const flown = logbookFlights.length - planned;
  document.getElementById('stat-flown').textContent = flown;
  document.getElementById('stat-planned').textContent = planned;
  document.getElementById('stat-total').textContent = logbookFlights.length;
  
  const c = document.getElementById('logbook-list');
  if (!logbookFlights.length) {
    c.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📖</div><div class="empty-state-text">No flights yet.</div></div>';
    return;
  }
  c.innerHTML = [...logbookFlights].reverse().map(f => {
    const logo = airlineLogos[f.airline];
    const logoHtml = logo ? `<img src="${logo}" alt="${f.airline}">` : `<span class="flight-logo-text">${f.airline || '–'}</span>`;
    return `<div class="flight-item ${f.planned ? 'planned' : 'flown'}">
      <div class="flight-logo">${logoHtml}</div>
      <div class="flight-route">
        <div class="flight-icaos"><span>${f.dep_icao}</span><span class="flight-arrow">→</span><span>${f.arr_icao}</span></div>
        <div class="flight-cities">${f.dep || ''} → ${f.arr || ''}</div>
      </div>
      ${f.aircraft ? `<div class="flight-eqp">${f.aircraft}</div>` : ''}
    </div>`;
  }).join('');
  drawGlobe();
}

// ROLL
function rollAll() {
  if (typeof DB_SCHED === 'undefined') { setTimeout(rollAll, 500); return; }
  if (navigator.vibrate) navigator.vibrate(10);
  lastResults = CATEGORIES.filter(c => c.items && c.items.length > 0).map(cat => {
    let result = {icao:'',city:'',country:'',iata:'',diff:'',itemName:'',lat:null,lon:null};
    if (['list','list-simple','list-themed'].includes(cat.type)) {
      const item = cat.items[Math.floor(Math.random() * cat.items.length)];
      const db = item.icao ? schedByCode[item.icao] : null;
      result.icao = item.icao || '';
      result.iata = item.iata || (db ? db[1] : '') || '';
      result.city = item.city || item.name || (db ? db[7] || db[2] : '');
      result.country = item.country || (db ? countryName(db[6]) : '');
      result.diff = item.diff || '';
      result.itemName = item.theme || (cat.id === 'formula1' ? item.name : '') || '';
      if (db) { result.lat = db[3]; result.lon = db[4]; }
    } else if (cat.type === 'rand-icao' || cat.type === 'rand-iata') {
      const pool = cat.type === 'rand-iata' ? DB_SCHED.filter(r => r[1]) : DB_SCHED;
      const ap = pool[Math.floor(Math.random() * pool.length)];
      result = { icao: ap[0], iata: ap[1]||'', city: ap[7] || ap[2], country: countryName(ap[6]), lat: ap[3], lon: ap[4] };
    }
    return { cat, result };
  });
  renderResults();
}

function renderResults() {
  const c = document.getElementById('results-list');
  if (!lastResults.some(r => r.result.icao)) {
    c.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🎲</div><div class="empty-state-text">Tap "Next Flight" to roll</div></div>';
    return;
  }
  c.innerHTML = lastResults.filter(r => r.result.icao).map(({cat, result}) => {
    const col = COLORS[cat.colorIdx % COLORS.length];
    return `<div class="result-card">
      <div class="result-header"><div class="result-dot" style="background:${col}"></div><div class="result-cat-name">${cat.name}</div></div>
      <div class="result-icao">${result.icao}${result.iata ? `<span class="result-iata">/ ${result.iata}</span>` : ''}</div>
      <div class="result-city">${result.city}</div>
      <div class="result-country">${result.country}</div>
      ${result.diff ? `<div class="result-badge">${result.diff}</div>` : ''}
      ${result.itemName ? `<div class="result-badge">${result.itemName}</div>` : ''}
    </div>`;
  }).join('');
}

// DATA
function renderCatsList() {
  const c = document.getElementById('cats-list');
  const groups = {themes:'Themes', randoms:'Random', networks:'Networks', custom:'Custom'};
  let html = '';
  for (const [gid, gname] of Object.entries(groups)) {
    const cats = CATEGORIES.filter(x => x.group === gid && x.items && x.items.length > 0);
    if (!cats.length) continue;
    html += `<div class="cat-section"><div class="cat-section-title">${gname}</div><div class="cat-chips">
      ${cats.map(cat => `<div class="cat-chip" onclick="openCatDetail('${cat.id}')"><div class="cat-chip-dot" style="background:${COLORS[cat.colorIdx % COLORS.length]}"></div>${cat.name}<span class="cat-chip-count">${cat.items.length}</span></div>`).join('')}
    </div></div>`;
  }
  c.innerHTML = html || '<div class="empty-state">No categories</div>';
  document.getElementById('cat-detail').classList.remove('active');
  c.style.display = '';
}

function openCatDetail(catId) {
  const cat = CATEGORIES.find(c => c.id === catId); if (!cat) return;
  document.getElementById('cats-list').style.display = 'none';
  document.getElementById('cat-detail').classList.add('active');
  document.getElementById('cat-detail-title').textContent = cat.name;
  const list = document.getElementById('cat-items-list');
  list.innerHTML = cat.items.slice(0, 50).map(item => {
    const db = item.icao ? schedByCode[item.icao] : null;
    const name = item.name || item.city || (db ? db[7] || db[2] : '');
    const country = item.country || (db ? countryName(db[6]) : '');
    return `<div class="cat-item"><div class="cat-item-icao">${item.icao || '–'}</div><div class="cat-item-name">${name}</div><div class="cat-item-country">${country}</div></div>`;
  }).join('');
  if (cat.items.length > 50) list.innerHTML += `<div style="text-align:center;padding:12px;color:var(--txt3);">+${cat.items.length - 50} more</div>`;
}

function closeCatDetail() {
  document.getElementById('cat-detail').classList.remove('active');
  document.getElementById('cats-list').style.display = '';
}

// INIT
async function init() {
  let a = 0;
  while (typeof DB_SCHED === 'undefined' && a < 50) { await new Promise(r => setTimeout(r, 100)); a++; }
  if (typeof DB_SCHED !== 'undefined') DB_SCHED.forEach(r => { schedByCode[r[0]] = r; });
  await loadAllFromCloud();
  initGlobe();
  renderLogbook();
  document.getElementById('loading').classList.add('hidden');
}
init();
  </script>
</body>
