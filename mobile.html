<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d1117">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>MSFS Manager</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/globe.gl@2.27.1/dist/globe.gl.min.js"></script>
  <script src="airports.js" defer></script>
  <style>
:root {
  --bg: #0d1117;
  --surf: #161b22;
  --surf2: #21262d;
  --bdr: #30363d;
  --txt: #e6edf3;
  --txt2: #8b949e;
  --txt3: #6e7681;
  --acc: #7d5ee8;
  --acc2: #a78bfa;
  --green: #3fb950;
  --orange: #f0883e;
  --blue: #58a6ff;
  --r: 10px;
  --ff: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { 
  height: 100%; 
  overflow: hidden;
  background: var(--bg); 
  color: var(--txt); 
  font-family: var(--ff);
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
}
.app {
  display: flex;
  flex-direction: column;
  height: 100%;
  padding-top: var(--safe-top);
}
.header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--surf);
  border-bottom: 1px solid var(--bdr);
  z-index: 10;
}
.header-title { font-size: 16px; font-weight: 600; }
.header-status { font-size: 11px; color: var(--green); }

.main { flex: 1; overflow: hidden; position: relative; }
.tab-content {
  position: absolute; inset: 0;
  display: none;
  flex-direction: column;
}
.tab-content.active { display: flex; }

.bottom-nav {
  flex-shrink: 0;
  display: flex;
  justify-content: space-around;
  padding: 6px 0 calc(6px + var(--safe-bottom));
  background: var(--surf);
  border-top: 1px solid var(--bdr);
  z-index: 10;
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 14px;
  border: none;
  background: none;
  color: var(--txt3);
  font-size: 9px;
  font-family: var(--ff);
}
.nav-item.active { color: var(--acc2); }
.nav-item svg { width: 22px; height: 22px; }

/* LOGBOOK LAYOUT */
#logbook-wrapper {
  display: flex;
  flex-direction: column;
  height: 100%;
  position: relative;
}

#globe-container {
  width: 100%;
  flex-shrink: 0;
  position: relative;
  background: #000;
  transition: height 0.3s ease;
}
#globe-container canvas { touch-action: none; }

/* Swipeable Panel */
#logbook-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  border-top-left-radius: 16px;
  border-top-right-radius: 16px;
  margin-top: -16px;
  position: relative;
  z-index: 5;
  min-height: 180px;
  max-height: calc(100% - 100px);
}

.panel-handle {
  width: 100%;
  padding: 10px 0 6px;
  display: flex;
  justify-content: center;
  cursor: grab;
}
.panel-handle-bar {
  width: 36px;
  height: 4px;
  background: var(--bdr);
  border-radius: 2px;
}

.logbook-filter {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px 10px;
  flex-shrink: 0;
}
.filter-input {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid var(--bdr);
  border-radius: 20px;
  background: var(--surf);
  color: var(--txt);
  font-size: 13px;
  font-family: var(--ff);
  outline: none;
}
.filter-input:focus { border-color: var(--acc); }
.filter-input::placeholder { color: var(--txt3); }
.filter-stats {
  font-size: 10px;
  color: var(--txt3);
  white-space: nowrap;
}

.logbook-list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 10px 10px;
  padding-bottom: calc(10px + var(--safe-bottom));
}

.flight-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: var(--surf);
  border-radius: 8px;
  margin-bottom: 6px;
}
.flight-item.planned { border-left: 3px solid var(--blue); }
.flight-item.flown { border-left: 3px solid #fff; }

/* Logo container with light background for visibility */
.flight-logo {
  width: 32px;
  height: 32px;
  border-radius: 4px;
  background: #f0f0f0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}
.flight-logo img { 
  width: 100%; 
  height: 100%; 
  object-fit: contain;
}
.flight-logo-text { 
  font-size: 8px; 
  font-weight: 700; 
  color: #666;
}

.flight-route { flex: 1; min-width: 0; }
.flight-icaos {
  font-family: 'SF Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 4px;
}
.flight-arrow { color: var(--txt3); font-size: 9px; }
.flight-cities {
  font-size: 9px;
  color: var(--txt3);
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.flight-eqp {
  font-family: 'SF Mono', monospace;
  font-size: 9px;
  font-weight: 600;
  color: var(--orange);
  background: rgba(240,136,62,0.15);
  padding: 2px 5px;
  border-radius: 3px;
  flex-shrink: 0;
}

.empty-state {
  text-align: center;
  padding: 24px 16px;
  color: var(--txt3);
}
.empty-state-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.5; }
.empty-state-text { font-size: 12px; }

/* ROLL */
.roll-tab-content {
  padding: 14px;
  padding-bottom: calc(70px + var(--safe-bottom));
  overflow-y: auto;
}
.roll-button {
  width: 100%;
  padding: 16px;
  margin-bottom: 16px;
  border: none;
  border-radius: var(--r);
  background: linear-gradient(135deg, var(--acc) 0%, #6344c7 100%);
  color: white;
  font-size: 17px;
  font-weight: 600;
  font-family: var(--ff);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.roll-button:active { transform: scale(0.98); }
.roll-button svg { width: 22px; height: 22px; }

.results-list { display: flex; flex-direction: column; gap: 10px; }
.result-card {
  background: var(--surf);
  border: 1px solid var(--bdr);
  border-radius: var(--r);
  padding: 12px 14px;
}
.result-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.result-dot { width: 7px; height: 7px; border-radius: 50%; }
.result-cat-name { font-size: 10px; font-weight: 600; color: var(--txt2); text-transform: uppercase; }
.result-icao { font-size: 20px; font-weight: 700; font-family: 'SF Mono', monospace; color: var(--acc2); }
.result-iata { color: var(--blue); font-size: 14px; margin-left: 5px; }
.result-city { font-size: 14px; margin-top: 2px; }
.result-country { font-size: 12px; color: var(--txt2); }
.result-badge {
  display: inline-block;
  margin-top: 6px;
  padding: 3px 8px;
  border-radius: 12px;
  font-size: 10px;
  font-weight: 600;
  background: rgba(240,136,62,0.15);
  color: var(--orange);
}

/* DATA */
.data-tab-content { padding: 14px; padding-bottom: calc(70px + var(--safe-bottom)); overflow-y: auto; }
.cat-section { margin-bottom: 20px; }
.cat-section-title { font-size: 12px; font-weight: 600; color: var(--txt2); text-transform: uppercase; margin-bottom: 10px; }
.cat-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-chip {
  display: flex; align-items: center; gap: 5px;
  padding: 8px 12px;
  background: var(--surf);
  border: 1px solid var(--bdr);
  border-radius: 16px;
  font-size: 12px;
}
.cat-chip-dot { width: 6px; height: 6px; border-radius: 50%; }
.cat-chip-count { font-size: 10px; color: var(--txt3); }

.cat-detail { display: none; padding: 14px; padding-bottom: calc(70px + var(--safe-bottom)); overflow-y: auto; }
.cat-detail.active { display: block; }
.cat-detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.cat-back-btn {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border: none; background: var(--surf); border-radius: 50%; color: var(--txt);
}
.cat-detail-title { font-size: 16px; font-weight: 600; }
.cat-items-list { display: flex; flex-direction: column; gap: 6px; }
.cat-item {
  display: flex; align-items: center;
  padding: 10px;
  background: var(--surf);
  border: 1px solid var(--bdr);
  border-radius: 8px;
}
.cat-item-icao { font-family: 'SF Mono', monospace; font-size: 12px; font-weight: 600; color: var(--acc2); width: 50px; }
.cat-item-name { flex: 1; font-size: 12px; }
.cat-item-country { font-size: 10px; color: var(--txt3); }

/* LOADING */
.loading-overlay {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999;
}
.loading-overlay.hidden { display: none; }
.loading-spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--surf2);
  border-top-color: var(--acc);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { margin-top: 14px; font-size: 13px; color: var(--txt2); }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading...</div>
  </div>

  <div class="app">
    <header class="header">
      <div class="header-title">✈️ MSFS Manager</div>
      <div class="header-status" id="cloud-status">Loading…</div>
    </header>

    <main class="main">
      <!-- LOGBOOK -->
      <div class="tab-content active" id="tab-logbook">
        <div id="logbook-wrapper">
          <div id="globe-container"></div>
          <div id="logbook-panel">
            <div class="panel-handle" id="panel-handle">
              <div class="panel-handle-bar"></div>
            </div>
            <div class="logbook-filter">
              <input type="text" class="filter-input" id="filter-input" placeholder="Filter: ICAO, IATA, city..." oninput="applyFilter()">
              <div class="filter-stats" id="filter-stats">0</div>
            </div>
            <div class="logbook-list" id="logbook-list"></div>
          </div>
        </div>
      </div>

      <!-- ROLL -->
      <div class="tab-content" id="tab-roll">
        <div class="roll-tab-content">
          <button class="roll-button" onclick="rollAll()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="2" width="20" height="20" rx="4"/>
              <circle cx="8" cy="8" r="1.5" fill="currentColor"/><circle cx="16" cy="8" r="1.5" fill="currentColor"/>
              <circle cx="8" cy="16" r="1.5" fill="currentColor"/><circle cx="16" cy="16" r="1.5" fill="currentColor"/>
              <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
            </svg>
            Next Flight
          </button>
          <div class="results-list" id="results-list">

      <!-- DATA -->
      <div class="tab-content" id="tab-data">
        <div class="data-tab-content" id="cats-list"></div>
        <div class="cat-detail" id="cat-detail">
          <div class="cat-detail-header">
            <button class="cat-back-btn" onclick="closeCatDetail()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <div class="cat-detail-title" id="cat-detail-title">Category</div>
          </div>
          <div class="cat-items-list" id="cat-items-list"></div>
        </div>
      </div>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" onclick="switchTab('logbook')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
        </svg>
        Logbook
      </button>
      <button class="nav-item" onclick="switchTab('roll')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="2" width="20" height="20" rx="4"/><circle cx="8" cy="8" r="1" fill="currentColor"/><circle cx="16" cy="16" r="1" fill="currentColor"/>
        </svg>
        Roll
      </button>
      <button class="nav-item" onclick="switchTab('data')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
        Data
      </button>
    </nav>
  </div>

  <script>
const COLORS = ['#7d5ee8','#3fb950','#f0883e','#58a6ff','#d29922','#ec6547','#56d364','#79c0ff','#a78bfa','#ff7b72','#d2a8ff','#ffa657'];
const COUNTRY_NAMES = {US:'United States',GB:'United Kingdom',FR:'France',DE:'Germany',IT:'Italy',ES:'Spain',AT:'Austria',CH:'Switzerland',NL:'Netherlands',BE:'Belgium',CA:'Canada',JP:'Japan',AU:'Australia',NZ:'New Zealand',BR:'Brazil',MX:'Mexico',CN:'China',IN:'India',SG:'Singapore',AE:'UAE',QA:'Qatar',NO:'Norway',SE:'Sweden',DK:'Denmark',FI:'Finland',IS:'Iceland',GR:'Greece',TR:'Turkey',PT:'Portugal',PL:'Poland',CZ:'Czechia',HU:'Hungary',IE:'Ireland',LU:'Luxembourg',HR:'Croatia',RU:'Russia'};
function countryName(iso) { return COUNTRY_NAMES[iso] || iso; }

let CATEGORIES = [
  {id:'difficult',name:'Difficult Airports',group:'themes',colorIdx:0,type:'list',items:[]},
  {id:'interesting',name:'Interesting Airports',group:'themes',colorIdx:1,type:'list-simple',items:[]},
  {id:'mountain',name:'Mountain Climbing',group:'themes',colorIdx:2,type:'list-simple',items:[]},
  {id:'formula1',name:'Formula 1',group:'themes',colorIdx:4,type:'list-simple',items:[]},
  {id:'rand_icao',name:'Random ICAO',group:'randoms',colorIdx:5,type:'rand-icao',items:[]},
  {id:'rand_iata',name:'Random IATA',group:'randoms',colorIdx:6,type:'rand-iata',items:[]},
  {id:'british',name:'British Isles',group:'networks',colorIdx:0,type:'list-simple',items:[]},
  {id:'nordics',name:'Nordics',group:'networks',colorIdx:1,type:'list-simple',items:[]},
  {id:'central_eu',name:'Central Europe',group:'networks',colorIdx:2,type:'list-simple',items:[]},
];

let schedByCode = {};
let logbookFlights = [];
let lastResults = [];
let _supabaseLogos = {}; // code → base64 data URL (same as desktop)
let filterText = '';
let myGlobe = null;
let globeHeight = 0;
let panelMinHeight = 180;

// SUPABASE
const SUPA_URL = 'https://pvsvpkquoqffprmrlvbv.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2c3Zwa3F1b3FmZnBybXJsdmJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NDg1NjUsImV4cCI6MjA5MTAyNDU2NX0.XTwueIlgbtkK56GJq-gPfjueOKTw1b6YtLLjQwx19pc';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

function setCloudStatus(msg, cls) {
  const el = document.getElementById('cloud-status');
  if (el) { el.textContent = msg; el.style.color = cls === 'ok' ? '#3fb950' : cls === 'err' ? '#f85149' : '#d29922'; }
}

// Logo URL - same logic as desktop: Supabase first, then GitHub
function getLogoUrl(code) {
  if (!code) return null;
  code = code.toUpperCase();
  if (_supabaseLogos[code]) return _supabaseLogos[code];
  return 'https://zugflyer.github.io/msfs-randomizer/logos/' + code + '.png';
}

async function loadAllFromCloud() {
  setCloudStatus('Loading…', 'ing');
  try {
    const { data, error } = await sb.from('categories').select('name, items');
    if (error) throw error;
    if (data && data.length > 0) {
      const byId = {};
      data.forEach(row => { byId[row.name] = row.items; });
      
      // Load logbook
      if (byId['__logbook__']) logbookFlights = byId['__logbook__'];
      
      // Load airline logos - stored as OBJECT not array!
      if (byId['__airline_logos__'] && typeof byId['__airline_logos__'] === 'object' && !Array.isArray(byId['__airline_logos__'])) {
        _supabaseLogos = byId['__airline_logos__'];
        console.log('Loaded ' + Object.keys(_supabaseLogos).length + ' logos from Supabase');
      }
      
      // Update categories
      CATEGORIES.forEach(cat => { if (byId[cat.id] && Array.isArray(byId[cat.id])) cat.items = byId[cat.id]; });
      
      // Load custom themed categories
      const existingIds = new Set(CATEGORIES.map(c => c.id));
      data.forEach(row => {
        if (!existingIds.has(row.name) && !row.name.startsWith('__') && Array.isArray(row.items) && row.items.length > 0 && row.items[0]?.theme !== undefined) {
          CATEGORIES.push({ id: row.name, name: row.name.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase()), group: 'custom', colorIdx: CATEGORIES.length % 12, type: 'list-themed', items: row.items });
        }
      });
      
      setCloudStatus('✓ Synced', 'ok');
    }
  } catch(e) { console.error(e); setCloudStatus('⚠ Offline', 'err'); }
}

// NAV
function switchTab(tabId) {
  document.querySelectorAll('.nav-item').forEach((btn, i) => btn.classList.toggle('active', ['logbook','roll','data'][i] === tabId));
  document.querySelectorAll('.tab-content').forEach(tab => tab.classList.toggle('active', tab.id === 'tab-' + tabId));
  if (tabId === 'logbook') { renderLogbook(); updateGlobeArcs(); resizeGlobe(); }
  if (tabId === 'data') renderCatsList();
}

// PANEL SWIPE
function initPanelSwipe() {
  const handle = document.getElementById('panel-handle');
  const panel = document.getElementById('logbook-panel');
  const globeContainer = document.getElementById('globe-container');
  const wrapper = document.getElementById('logbook-wrapper');
  
  let startY = 0;
  let startHeight = 0;
  let isDragging = false;
  
  handle.addEventListener('touchstart', e => {
    isDragging = true;
    startY = e.touches[0].clientY;
    startHeight = globeContainer.offsetHeight;
    panel.style.transition = 'none';
    globeContainer.style.transition = 'none';
  });
  
  document.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const dy = e.touches[0].clientY - startY;
    const wrapperHeight = wrapper.offsetHeight;
    let newGlobeHeight = startHeight + dy;
    
    const minGlobeHeight = 100;
    const maxGlobeHeight = wrapperHeight - panelMinHeight;
    newGlobeHeight = Math.max(minGlobeHeight, Math.min(maxGlobeHeight, newGlobeHeight));
    
    globeContainer.style.height = newGlobeHeight + 'px';
    globeHeight = newGlobeHeight;
  });
  
  document.addEventListener('touchend', () => {
    if (!isDragging) return;
    isDragging = false;
    panel.style.transition = '';
    globeContainer.style.transition = '';
    resizeGlobe();
  });
}

// GLOBE
function initGlobe() {
  const container = document.getElementById('globe-container');
  const wrapper = document.getElementById('logbook-wrapper');
  
  globeHeight = Math.round(wrapper.offsetHeight * 0.55);
  container.style.height = globeHeight + 'px';
  
  const w = container.offsetWidth;
  const h = globeHeight;
  
  myGlobe = Globe()
    // Natural Earth map - clearer landmasses like desktop
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
    .backgroundColor('rgba(0,0,0,0)')
    .width(w)
    .height(h)
    // Thin, subtle arcs - white for flown, blue for planned
    .arcColor(d => d.planned ? 'rgba(88,166,255,0.6)' : 'rgba(255,255,255,0.7)')
    .arcStroke(0.4)
    .arcDashLength(1)
    .arcDashGap(0)
    .arcDashAnimateTime(0)
    .arcsTransitionDuration(0)
    // Small points at airports
    .pointColor(d => d.planned ? '#58a6ff' : '#ffffff')
    .pointAltitude(0.005)
    .pointRadius(0.2)
    // Subtle atmosphere
    .atmosphereColor('#4080a0')
    .atmosphereAltitude(0.1)
    (container);
  
  // Start over Europe
  myGlobe.pointOfView({ lat: 48, lng: 10, altitude: 2.2 }, 0);
  
  // Controls
  myGlobe.controls().enableZoom = true;
  myGlobe.controls().enablePan = false;
  myGlobe.controls().autoRotate = false;
  myGlobe.controls().minDistance = 120;
  myGlobe.controls().maxDistance = 400;
}

function resizeGlobe() {
  if (!myGlobe) return;
  const container = document.getElementById('globe-container');
  myGlobe.width(container.offsetWidth);
  myGlobe.height(container.offsetHeight);
}

function updateGlobeArcs() {
  if (!myGlobe) return;
  
  const flights = getFilteredFlights();
  
  // Arcs
  const arcs = flights.filter(f => f.dep_lat && f.arr_lat).map(f => ({
    startLat: f.dep_lat,
    startLng: f.dep_lon,
    endLat: f.arr_lat,
    endLng: f.arr_lon,
    planned: f.planned
  }));
  
  // Points
  const pointSet = new Map();
  flights.forEach(f => {
    if (f.dep_lat) pointSet.set(f.dep_icao, { lat: f.dep_lat, lng: f.dep_lon, planned: f.planned });
    if (f.arr_lat) pointSet.set(f.arr_icao, { lat: f.arr_lat, lng: f.arr_lon, planned: f.planned });
  });
  
  myGlobe.arcsData(arcs).pointsData(Array.from(pointSet.values()));
}

function getFilteredFlights() {
  if (!filterText) return logbookFlights;
  const q = filterText.toLowerCase();
  return logbookFlights.filter(f => 
    (f.dep_icao && f.dep_icao.toLowerCase().includes(q)) ||
    (f.arr_icao && f.arr_icao.toLowerCase().includes(q)) ||
    (f.dep_iata && f.dep_iata.toLowerCase().includes(q)) ||
    (f.arr_iata && f.arr_iata.toLowerCase().includes(q)) ||
    (f.dep && f.dep.toLowerCase().includes(q)) ||
    (f.arr && f.arr.toLowerCase().includes(q)) ||
    (f.airline && f.airline.toLowerCase().includes(q))
  );
}

function applyFilter() {
  filterText = document.getElementById('filter-input').value.trim();
  renderLogbook();
  updateGlobeArcs();
}

// LOGBOOK
function renderLogbook() {
  const flights = getFilteredFlights();
  
  document.getElementById('filter-stats').textContent = flights.length;
  
  const c = document.getElementById('logbook-list');
  if (!flights.length) {
    c.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📖</div><div class="empty-state-text">${filterText ? 'No matches' : 'No flights'}</div></div>`;
    return;
  }
  
  c.innerHTML = [...flights].reverse().map(f => {
    const code = f.airline || '';
    const logoUrl = getLogoUrl(code);
    
    // If we have a logo URL, show image with onerror fallback to text
    const logoHtml = logoUrl
      ? `<img src="${logoUrl}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" alt="${code}"><span class="flight-logo-text" style="display:none;">${code || '–'}</span>`
      : `<span class="flight-logo-text">${code || '–'}</span>`;
    
    return `<div class="flight-item ${f.planned ? 'planned' : 'flown'}">
      <div class="flight-logo">${logoHtml}</div>
      <div class="flight-route">
        <div class="flight-icaos"><span>${f.dep_icao}</span><span class="flight-arrow">→</span><span>${f.arr_icao}</span></div>
        <div class="flight-cities">${f.dep || ''} → ${f.arr || ''}</div>
      </div>
      ${f.aircraft ? `<div class="flight-eqp">${f.aircraft}</div>` : ''}
    </div>`;
  }).join('');
}

// ROLL
function rollAll() {
  if (typeof DB_SCHED === 'undefined') { setTimeout(rollAll, 500); return; }
  if (navigator.vibrate) navigator.vibrate(10);
  
  lastResults = CATEGORIES.filter(c => c.items && c.items.length > 0).map(cat => {
    let result = {icao:'',city:'',country:'',iata:'',diff:'',itemName:'',lat:null,lon:null};
    if (['list','list-simple','list-themed'].includes(cat.type)) {
      const item = cat.items[Math.floor(Math.random() * cat.items.length)];
      const db = item.icao ? schedByCode[item.icao] : null;
      result.icao = item.icao || '';
      result.iata = item.iata || (db ? db[1] : '') || '';
      result.city = item.city || item.name || (db ? db[7] || db[2] : '');
      result.country = item.country || (db ? countryName(db[6]) : '');
      result.diff = item.diff || '';
      result.itemName = item.theme || (cat.id === 'formula1' ? item.name : '') || '';
      if (db) { result.lat = db[3]; result.lon = db[4]; }
    } else if (cat.type === 'rand-icao' || cat.type === 'rand-iata') {
      const pool = cat.type === 'rand-iata' ? DB_SCHED.filter(r => r[1]) : DB_SCHED;
      const ap = pool[Math.floor(Math.random() * pool.length)];
      result = { icao: ap[0], iata: ap[1]||'', city: ap[7] || ap[2], country: countryName(ap[6]), lat: ap[3], lon: ap[4] };
    }
    return { cat, result };
  });
  renderResults();
}

function renderResults() {
  const c = document.getElementById('results-list');
  if (!lastResults.some(r => r.result.icao)) {
    c.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🎲</div><div class="empty-state-text">Tap "Next Flight" to roll</div></div>';
    return;
  }
  c.innerHTML = lastResults.filter(r => r.result.icao).map(({cat, result}) => {
    const col = COLORS[cat.colorIdx % COLORS.length];
    return `<div class="result-card">
      <div class="result-header"><div class="result-dot" style="background:${col}"></div><div class="result-cat-name">${cat.name}</div></div>
      <div class="result-icao">${result.icao}${result.iata ? `<span class="result-iata">/ ${result.iata}</span>` : ''}</div>
      <div class="result-city">${result.city}</div>
      <div class="result-country">${result.country}</div>
      ${result.diff ? `<div class="result-badge">${result.diff}</div>` : ''}
      ${result.itemName ? `<div class="result-badge">${result.itemName}</div>` : ''}
    </div>`;
  }).join('');
}

// DATA
function renderCatsList() {
  const c = document.getElementById('cats-list');
  const groups = {themes:'Themes', randoms:'Random', networks:'Networks', custom:'Custom'};
  let html = '';
  for (const [gid, gname] of Object.entries(groups)) {
    const cats = CATEGORIES.filter(x => x.group === gid && x.items && x.items.length > 0);
    if (!cats.length) continue;
    html += `<div class="cat-section"><div class="cat-section-title">${gname}</div><div class="cat-chips">
      ${cats.map(cat => `<div class="cat-chip" onclick="openCatDetail('${cat.id}')"><div class="cat-chip-dot" style="background:${COLORS[cat.colorIdx % COLORS.length]}"></div>${cat.name}<span class="cat-chip-count">${cat.items.length}</span></div>`).join('')}
    </div></div>`;
  }
  c.innerHTML = html || '<div class="empty-state">No categories</div>';
  document.getElementById('cat-detail').classList.remove('active');
  c.style.display = '';
}

function openCatDetail(catId) {
  const cat = CATEGORIES.find(c => c.id === catId); if (!cat) return;
  document.getElementById('cats-list').style.display = 'none';
  document.getElementById('cat-detail').classList.add('active');
  document.getElementById('cat-detail-title').textContent = cat.name;
  const list = document.getElementById('cat-items-list');
  list.innerHTML = cat.items.slice(0, 50).map(item => {
    const db = item.icao ? schedByCode[item.icao] : null;
    const name = item.name || item.city || (db ? db[7] || db[2] : '');
    const country = item.country || (db ? countryName(db[6]) : '');
    return `<div class="cat-item"><div class="cat-item-icao">${item.icao || '–'}</div><div class="cat-item-name">${name}</div><div class="cat-item-country">${country}</div></div>`;
  }).join('');
  if (cat.items.length > 50) list.innerHTML += `<div style="text-align:center;padding:10px;color:var(--txt3);font-size:11px;">+${cat.items.length - 50} more</div>`;
}

function closeCatDetail() {
  document.getElementById('cat-detail').classList.remove('active');
  document.getElementById('cats-list').style.display = '';
}

// INIT
async function init() {
  let a = 0;
  while (typeof DB_SCHED === 'undefined' && a < 50) { await new Promise(r => setTimeout(r, 100)); a++; }
  if (typeof DB_SCHED !== 'undefined') DB_SCHED.forEach(r => { schedByCode[r[0]] = r; });
  
  await loadAllFromCloud();
  
  initGlobe();
  initPanelSwipe();
  renderLogbook();
  updateGlobeArcs();
  
  window.addEventListener('resize', resizeGlobe);
  
  document.getElementById('loading').classList.add('hidden');
}

init();
  </script>
</body>
